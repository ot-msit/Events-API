name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t events-api:latest .

      - name: Start container
        run: docker run -d --name events-api -p 5000:5000 events-api:latest

      - name: Wait for API to be healthy
        run: |
          for i in {1..15}; do
            curl -fs http://localhost:5000/api/health && exit 0
            sleep 2
          done
          echo "API never became healthy"
          docker logs events-api
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests against the container
        run: pytest -v

      - name: Cleanup container
        if: always()
        run: |
          docker stop events-api
          docker rm events-api
  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest

      - name: Trigger Render deployment
        run: curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for rollout
        run: sleep 60

      - name: Smoke test the live deployment
        run: |
          for i in {1..20}; do
            if curl -fs "${{ secrets.RENDER_BASE_URL }}/api/health"; then
              echo "Live deployment is healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "Smoke test never succeeded"
          exit 1