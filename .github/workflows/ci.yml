name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t events-api:latest .

      - name: Start container
        run: docker run -d --name events-api -p 5000:5000 events-api:latest

      - name: Wait for API to be healthy
        run: |
          for i in {1..15}; do
            curl -fs http://localhost:5000/api/health && exit 0
            sleep 2
          done
          echo "API never became healthy"
          docker logs events-api
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests against the container
        run: pytest -v

      - name: Cleanup container
        if: always()
        run: |
          docker stop events-api
          docker rm events-api